# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/launchpad_db

# If the above doesn't work, try this explicit format:
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=launchpad_db

# JWT Secret Key
# JWT Configuration
jwt.secret=your_very_long_and_secure_jwt_secret_key_that_is_at_least_256_bits_long
jwt.expiration=86400000

# Server port
server.port=8080

# CORS Configuration - ADD THESE LINES
cors.allowed-origins=http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Enable debug logging to see what's happening
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.mongodb=DEBUG
logging.level.com.launchpad=DEBUG
logging.level.org.springframework.web=DEBUG

logging.level.org.springframework=INFO

# Upload folder (relative or absolute)
