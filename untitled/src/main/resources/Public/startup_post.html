<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>LaunchPad — Posts</title>
    <link rel="stylesheet" href="css/startup_shared_styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/profile-popup-styles.css">
    <style>
        /* === LAYOUT FIX: FORCE SIDEBAR TO RIGHT === */
        body {
            background-color: #f9fafb; /* Light background */
        }
        #posts {
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px;
        }
        .posts-grid {
            display: grid;
            /* This line creates the 2 columns: Auto width for feed, 320px for sidebar */
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 24px;
            align-items: start;
        }

        /* Make sidebar sticky so it stays visible when scrolling */
        .sidebar-column {
            position: sticky;
            top: 20px;
        }

        /* Hide sidebar on small screens (mobile) */
        @media (max-width: 900px) {
            .posts-grid {
                grid-template-columns: 1fr;
            }
            .sidebar-column {
                display: none;
            }
        }

        /* === POST CARD STYLES === */
        .post-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
            padding: 24px;
            transition: all 0.3s;
            border: 1px solid #f0f0f0;
        }
        .post-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }
        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
        }
        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .post-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .post-avatar-initials {
            color: white;
            font-weight: 600;
            font-size: 18px;
        }
        .post-header-info { flex: 1; }
        .post-author {
            font-weight: 600;
            font-size: 16px;
            color: #1a1a1a;
        }
        .post-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 4px;
        }
        .post-time {
            color: #666;
            font-size: 13px;
        }
        /* Delete Button for Startups */
        .post-delete-btn {
            background: #fff;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            margin-left: auto;
        }
        .post-delete-btn:hover {
            background: #e74c3c;
            color: white;
        }
        .post-content { margin-bottom: 16px; }
        .post-text {
            color: #333;
            font-size: 15px;
            line-height: 1.6;
            margin: 0 0 16px 0;
            white-space: pre-wrap;
        }
        .post-media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .post-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
        }
        .post-video {
            width: 100%;
            border-radius: 12px;
            max-height: 400px;
        }
        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .post-tag {
            background: linear-gradient(135deg, #e3f2fd 0%, #e1f5fe 100%);
            color: #1976d2;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 13px;
        }
        .post-stats {
            display: flex;
            gap: 20px;
            padding: 12px 0;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 8px;
        }
        .post-stat {
            color: #666;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .post-actions {
            display: flex;
            gap: 8px;
            padding: 8px 0;
        }
        .post-action-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .post-action-btn:hover {
            background: #f5f5f5;
        }
        .post-action-btn.liked {
            color: #e74c3c;
        }
        .comments-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #f0f0f0;
        }
        .comment-input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .comment-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
        }
        .comment-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .comment-submit-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }
        .comment-item {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .comment-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .comment-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .comment-avatar-initials {
            color: white;
            font-size: 14px;
            font-weight: 600;
        }
        .comment-content {
            flex: 1;
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 16px;
        }
        .comment-author {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }
        .comment-time {
            font-size: 12px;
            color: #999;
            margin-left: 8px;
        }
        .comment-text {
            margin: 4px 0 0 0;
            color: #555;
            font-size: 14px;
        }
        .loading-posts {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .feed-filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            padding: 8px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .filter-btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            background: transparent;
            color: #666;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
        }
        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Sidebar Specifics */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #333;
        }
        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .skill-tag {
            background: #f0f4f8;
            color: #2c3e50;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .card {
             background: white;
             border-radius: 16px;
             box-shadow: 0 2px 8px rgba(0,0,0,0.08);
             padding: 24px;
             margin-bottom: 24px;
        }
    </style>
</head>
<body>
<div class="site-wrap">
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">LP</div>
                <div class="logo-text">LaunchPad</div>
            </div>
            <div class="nav-links">
                <a href="startup_index.html">Home</a>
                <a href="startup_posts.html">Posts</a>
                <a href="startup_bids.html">My Bids</a>
                <a href="startup_profile.html">Profile</a>
                <a href="startup_chat.html">Chat</a>
                <a href="#" class="nav-icon" onclick="toggleNotifications(event)"><i class="fas fa-bell"></i></a>
                <a href="#" class="nav-icon" onclick="toggleLogoutModal()"><i class="fas fa-right-from-bracket"></i></a>
            </div>
        </div>
    </header>

    <section id="posts">
        <div class="posts-grid">
            <main class="feed-column">
                <div class="card create-post-trigger-card" onclick="toggleCreatePostModal()">
                    <div class="start-post-top">
                        <div class="my-avatar">ST</div>
                        <div class="start-post-trigger-text">Start a post, share insights...</div>
                    </div>
                    <div class="start-post-actions">
                        <button class="post-btn">Post</button>
                    </div>
                </div>

                <div class="feed-filter-bar">
                    <button class="filter-btn active" onclick="filterPosts(event, 'all')">All</button>
                    <button class="filter-btn" onclick="filterPosts(event, 'investor')">Investors</button>
                    <button class="filter-btn" onclick="filterPosts(event, 'startup')">Startups</button>
                </div>

                <div class="post-feed" id="post-feed">
                    <div class="loading-posts"><div class="loader"></div><p>Loading posts...</p></div>
                </div>
            </main>

            <aside class="sidebar-column">
                <div class="card">
                    <div class="section-title">Trending Tags</div>
                    <div class="skills-list">
                        <span class="skill-tag">#AI</span>
                        <span class="skill-tag">#Funding</span>
                        <span class="skill-tag">#SaaS</span>
                        <span class="skill-tag">#Fintech</span>
                    </div>
                </div>
            </aside>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
            </div>
            <div class="copyright">© 2025 LaunchPad</div>
        </div>
    </footer>
</div>

<div id="create-post-modal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 700px;">
        <h3>Create a Post</h3>
        <div class="create-post-header">
            <div class="my-avatar">ST</div>
            <span id="modal-user-name">Startup Name</span>
        </div>
        <textarea id="create-post-textarea" placeholder="What's on your mind?" style="width: 100%; min-height: 120px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px;"></textarea>
        <div class="modal-buttons" style="justify-content: space-between;">
            <div>
                <label for="post-attachment-modal" style="background: #f0f0f0; padding: 8px 16px; border-radius: 6px; cursor: pointer;">
                    <i class="fas fa-paperclip"></i> Attach File
                </label>
                <input type="file" id="post-attachment-modal" multiple accept="image/*,video/*" style="display: none;">
            </div>
            <div>
                <button class="cancel-btn" onclick="toggleCreatePostModal()">Cancel</button>
                <button class="save-btn" onclick="createPost()">Post</button>
            </div>
        </div>
    </div>
</div>

<div id="logout-confirm-modal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <h3>Log Out</h3>
        <p>Are you sure?</p>
        <div class="modal-buttons" style="justify-content: center;">
            <button class="cancel-btn" onclick="toggleLogoutModal()">Cancel</button>
            <button class="save-btn" onclick="confirmLogout()" style="background-color: #e74c3c;">Log Out</button>
        </div>
    </div>
</div>

<script src="js/startup_shared_scripts.js"></script>
<script src="js/profile-popup.js"></script>
<script src="js/startup_posts.js"></script>
</body>
</html>
